  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* ==========================================================================\n   Ember — Color tokens\n   One accent (Ember Amber) carries all brand voltage. Two canvas modes:\n   dark (marketing / product) and light (transactional). Trading green/red\n   are semantic price-direction tokens shared across both modes.\n   ========================================================================== */\n\n:root {\n  /* --- Brand & accent ------------------------------------------------- */\n  --color-primary: #ff9f1c;          /* Ember Amber — the single brand color */\n  --color-primary-active: #e8870f;   /* press / darker variant */\n  --color-primary-disabled: #3d3220; /* desaturated dark amber on dark canvas */\n  --color-accent-spark: #22d3a6;     /* single-product accent (teal). NOT a system color */\n\n  /* --- Surface : dark mode (marketing default) ----------------------- */\n  --color-canvas-dark: #0c0e12;          /* page floor — near-black, warm tint */\n  --color-surface-card-dark: #15181e;    /* elevated cards, dropdowns, secondary btns */\n  --color-surface-elevated-dark: #1e222b;/* nested cards, chart panels, hover steps */\n\n  /* --- Surface : light mode (transactional) -------------------------- */\n  --color-canvas-light: #ffffff;         /* page floor on transactional pages */\n  --color-surface-soft-light: #fafafb;   /* footer surface + disabled states */\n  --color-surface-strong-light: #f4f5f7; /* muted input backgrounds */\n\n  /* --- Hairlines & borders ------------------------------------------- */\n  --color-hairline-on-light: #e9ebef;    /* 1px border tone on light surfaces */\n  --color-hairline-on-dark: #1e222b;     /* 1px border tone on dark (= surface step) */\n  --color-border-strong: #cbd0d8;        /* heavier border on disabled secondary btns */\n\n  /* --- Text ----------------------------------------------------------- */\n  --color-ink: #14161b;          /* strongest text on light surfaces */\n  --color-body: #e9ebef;         /* running text on dark — cool off-white */\n  --color-body-on-light: #14161b;/* light-mode body (= ink) */\n  --color-muted: #717a8a;        /* footer links, captions, table headers (both modes) */\n  --color-muted-strong: #929aa6; /* second-tier muted for emphasized labels */\n  --color-on-primary: #1a1206;   /* warm near-black text on amber CTAs */\n  --color-on-dark: #ffffff;      /* pure white high-contrast headlines on dark */\n\n  /* --- Trading semantics --------------------------------------------- */\n  --color-trading-up: #16c784;   /* price up (green) — text/icon, never card fill */\n  --color-trading-down: #ea3943; /* price down (red) — text/icon, never card fill */\n\n  /* --- Info / focus --------------------------------------------------- */\n  --color-info: #3b82f6;         /* inline info badges + focus-ring base */\n  --color-focus-ring: rgba(59, 130, 246, 0.5);\n\n  /* --- Semantic aliases (theme-neutral defaults = dark mode) ---------- */\n  --bg-canvas: var(--color-canvas-dark);\n  --bg-surface: var(--color-surface-card-dark);\n  --bg-elevated: var(--color-surface-elevated-dark);\n  --text-strong: var(--color-on-dark);\n  --text-default: var(--color-body);\n  --text-muted: var(--color-muted);\n  --border-hairline: var(--color-hairline-on-dark);\n}\n\n/* Light theme scope — flip canvas/surface/text, keep amber + trading tokens.\n   Apply with <div data-theme=\"light\"> or class .theme-light. */\n[data-theme=\"light\"],\n.theme-light {\n  --bg-canvas: var(--color-canvas-light);\n  --bg-surface: var(--color-canvas-light);\n  --bg-elevated: var(--color-surface-strong-light);\n  --text-strong: var(--color-ink);\n  --text-default: var(--color-body-on-light);\n  --text-muted: var(--color-muted);\n  --border-hairline: var(--color-hairline-on-light);\n}\n\n/* ==========================================================================\n   Ember — Typography tokens\n   Geist Sans for editorial type; Geist Mono for ALL numbers (prices, volumes,\n   percentages, stat counters). Display sizes run weight 700 — heavier than\n   typical marketing systems because numbers must read at a glance.\n   ========================================================================== */\n\n:root {\n  /* --- Families ------------------------------------------------------- */\n  --font-sans: \"Geist\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;\n  --font-mono: \"Geist Mono\", ui-monospace, \"SF Mono\", Menlo, monospace;\n\n  /* --- Weights -------------------------------------------------------- */\n  --weight-regular: 400;\n  --weight-medium: 500;\n  --weight-semibold: 600;\n  --weight-bold: 700;\n\n  /* --- Type roles : size / line-height / letter-spacing --------------- */\n  /* Editorial (Geist Sans) */\n  --type-hero-display-size: 64px;   --type-hero-display-lh: 1.1;  --type-hero-display-ls: -1px;\n  --type-display-lg-size: 48px;     --type-display-lg-lh: 1.1;    --type-display-lg-ls: -0.5px;\n  --type-display-md-size: 40px;     --type-display-md-lh: 1.15;   --type-display-md-ls: -0.3px;\n  --type-display-sm-size: 32px;     --type-display-sm-lh: 1.2;    --type-display-sm-ls: 0;\n  --type-title-lg-size: 24px;       --type-title-lg-lh: 1.3;      --type-title-lg-ls: 0;\n  --type-title-md-size: 20px;       --type-title-md-lh: 1.35;     --type-title-md-ls: 0;\n  --type-title-sm-size: 16px;       --type-title-sm-lh: 1.4;      --type-title-sm-ls: 0;\n  --type-body-md-size: 14px;        --type-body-md-lh: 1.5;       --type-body-md-ls: 0;\n  --type-body-sm-size: 13px;        --type-body-sm-lh: 1.5;       --type-body-sm-ls: 0;\n  --type-caption-size: 12px;        --type-caption-lh: 1.4;       --type-caption-ls: 0;\n  --type-button-size: 14px;         --type-button-lh: 1;          --type-button-ls: 0;\n  --type-nav-link-size: 14px;       --type-nav-link-lh: 1.4;      --type-nav-link-ls: 0;\n\n  /* Numbers (Geist Mono) */\n  --type-number-display-size: 40px; --type-number-display-lh: 1.1; --type-number-display-ls: -0.3px;\n  --type-number-md-size: 16px;      --type-number-md-lh: 1.4;      --type-number-md-ls: 0;\n  --type-number-sm-size: 14px;      --type-number-sm-lh: 1.4;      --type-number-sm-ls: 0;\n}\n\n/* ==========================================================================\n   Ember — Spacing tokens\n   4px base unit. Major editorial bands sit at --space-section (80px) —\n   tighter than airy marketing sites because product pages mix marketing\n   bands with dense tables and accordions.\n   ========================================================================== */\n\n:root {\n  --space-xxs: 4px;\n  --space-xs: 8px;\n  --space-sm: 12px;\n  --space-md: 16px;\n  --space-lg: 24px;\n  --space-xl: 32px;\n  --space-xxl: 48px;\n  --space-section: 80px;   /* vertical rhythm between major editorial bands */\n\n  /* Container widths */\n  --container-marketing: 1280px; /* centered marketing pages */\n  --container-product: 1440px;   /* dense product surfaces (markets, tables) */\n}\n\n/* ==========================================================================\n   Ember — Radius & elevation tokens\n   Radius hierarchy is tight (most surfaces 6–12px). The pill radius is a\n   deliberate exception reserved for top-of-page \"THE action\" CTAs.\n   Elevation is flat: depth comes from canvas↔surface color steps and\n   hairlines, NOT heavy drop shadows or glassmorphism.\n   ========================================================================== */\n\n:root {\n  /* --- Border radius -------------------------------------------------- */\n  --radius-xs: 2px;     /* very small badges */\n  --radius-sm: 4px;     /* small inline + trading buttons */\n  --radius-md: 6px;     /* standard CTAs, primary buttons, primary inputs */\n  --radius-lg: 8px;     /* search input, content cards, trust badges */\n  --radius-xl: 12px;    /* elevated card containers, CTA bands */\n  --radius-pill: 9999px;/* prominent feature CTAs (sign-up pill, join now) */\n  --radius-full: 9999px;/* coin icons, avatars (50% on circular outline) */\n\n  /* --- Elevation ------------------------------------------------------ */\n  /* Flat surfaces with color-block separation. Shadows used sparingly. */\n  --shadow-none: none;\n  --shadow-card-over-image: 0 8px 24px rgba(0, 0, 0, 0.12); /* card over imagery only */\n  --shadow-focus-ring: 0 0 0 2px var(--color-focus-ring);   /* input/button focus */\n}\n\n/* ==========================================================================\n   Ember — base helpers\n   Small, optional convenience layer. Sets the default sans family and a\n   couple of typography utility classes that map directly to the type roles.\n   Components reference tokens directly; these classes are for hand-authored\n   markup (cards, specimens, prototypes).\n   ========================================================================== */\n\n:root {\n  color-scheme: dark;\n}\n\n.ember-font-base {\n  font-family: var(--font-sans);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* Numbers always render mono — tabular figures for prices/volumes/% */\n.ember-num {\n  font-family: var(--font-mono);\n  font-feature-settings: \"tnum\" 1;\n}\n\n/* --- Type role utility classes ------------------------------------------- */\n.ty-hero-display { font: var(--weight-bold) var(--type-hero-display-size)/var(--type-hero-display-lh) var(--font-sans); letter-spacing: var(--type-hero-display-ls); }\n.ty-display-lg   { font: var(--weight-bold) var(--type-display-lg-size)/var(--type-display-lg-lh) var(--font-sans); letter-spacing: var(--type-display-lg-ls); }\n.ty-display-md   { font: var(--weight-semibold) var(--type-display-md-size)/var(--type-display-md-lh) var(--font-sans); letter-spacing: var(--type-display-md-ls); }\n.ty-display-sm   { font: var(--weight-semibold) var(--type-display-sm-size)/var(--type-display-sm-lh) var(--font-sans); letter-spacing: var(--type-display-sm-ls); }\n.ty-title-lg     { font: var(--weight-semibold) var(--type-title-lg-size)/var(--type-title-lg-lh) var(--font-sans); }\n.ty-title-md     { font: var(--weight-semibold) var(--type-title-md-size)/var(--type-title-md-lh) var(--font-sans); }\n.ty-title-sm     { font: var(--weight-semibold) var(--type-title-sm-size)/var(--type-title-sm-lh) var(--font-sans); }\n.ty-body-md      { font: var(--weight-regular) var(--type-body-md-size)/var(--type-body-md-lh) var(--font-sans); }\n.ty-body-sm      { font: var(--weight-regular) var(--type-body-sm-size)/var(--type-body-sm-lh) var(--font-sans); }\n.ty-caption      { font: var(--weight-medium) var(--type-caption-size)/var(--type-caption-lh) var(--font-sans); }\n.ty-button       { font: var(--weight-semibold) var(--type-button-size)/var(--type-button-lh) var(--font-sans); }\n.ty-nav-link     { font: var(--weight-medium) var(--type-nav-link-size)/var(--type-nav-link-lh) var(--font-sans); }\n\n.ty-number-display { font: var(--weight-bold) var(--type-number-display-size)/var(--type-number-display-lh) var(--font-mono); letter-spacing: var(--type-number-display-ls); font-feature-settings: \"tnum\" 1; }\n.ty-number-md      { font: var(--weight-medium) var(--type-number-md-size)/var(--type-number-md-lh) var(--font-mono); font-feature-settings: \"tnum\" 1; }\n.ty-number-sm      { font: var(--weight-medium) var(--type-number-sm-size)/var(--type-number-sm-lh) var(--font-mono); font-feature-settings: \"tnum\" 1; }\n\n<\u002Fstyle>\n<style>/* ============================================================\n   DevOps Day Taipei 2026 — AIOps Workshop deck\n   Built on the Ember design system (tokens linked separately).\n   Dark canvas · single amber accent · Geist Sans + Geist Mono.\n   ============================================================ */\n\n:root {\n  --amber: var(--color-primary);            /* #ff9f1c */\n  --amber-active: var(--color-primary-active);\n  --canvas: var(--color-canvas-dark);       /* #0c0e12 */\n  --surface: var(--color-surface-card-dark);/* #15181e */\n  --elevated: var(--color-surface-elevated-dark); /* #1e222b */\n  --hair: var(--color-hairline-on-dark);\n  --ink: var(--color-on-dark);\n  --body: var(--color-body);\n  --muted: var(--color-muted);\n  --muted2: var(--color-muted-strong);\n  --blue: var(--color-info);                /* #3b82f6  → Blue service */\n  --green: var(--color-trading-up);         /* #16c784  → Green / promote */\n  --red: var(--color-trading-down);         /* #ea3943  → rollback / fault */\n  --sans: var(--font-sans);\n  --mono: var(--font-mono);\n}\n\n* { box-sizing: border-box; }\n\nhtml, body { margin: 0; background: #000; }\n\ndeck-stage:not(:defined) { visibility: hidden; }\n\ndeck-stage {\n  font-family: var(--sans);\n  color: var(--body);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* ---- slide base ------------------------------------------------------ */\n.slide {\n  display: flex;\n  flex-direction: column;\n  padding: 84px 104px;\n  background: var(--canvas);\n  color: var(--body);\n  overflow: hidden;\n}\n.slide.pad-tight { padding: 72px 96px; }\n\n/* faint grid texture on darker slides */\n.slide.grid::before {\n  content: \"\";\n  position: absolute;\n  inset: 0;\n  background-image:\n    linear-gradient(var(--hair) 1px, transparent 1px),\n    linear-gradient(90deg, var(--hair) 1px, transparent 1px);\n  background-size: 64px 64px;\n  opacity: 0.22;\n  pointer-events: none;\n}\n\n.num { font-family: var(--mono); font-feature-settings: \"tnum\" 1; }\n\n/* ---- eyebrow / section tag ------------------------------------------ */\n.eyebrow {\n  display: inline-flex;\n  align-self: flex-start;\n  white-space: nowrap;\n  align-items: center;\n  gap: 14px;\n  font-family: var(--mono);\n  font-size: 24px;\n  font-weight: 500;\n  letter-spacing: 1px;\n  color: var(--amber);\n  text-transform: uppercase;\n}\n.eyebrow .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--amber); }\n.eyebrow .seg { color: var(--muted2); letter-spacing: 0.5px; }\n\n/* ---- titles --------------------------------------------------------- */\n.h-title { font-size: 60px; font-weight: 700; line-height: 1.08; letter-spacing: -1px; color: var(--ink); margin: 0; }\n.h-big   { font-size: 88px; font-weight: 700; line-height: 1.04; letter-spacing: -2px; color: var(--ink); margin: 0; }\n.h-sub   { font-size: 32px; font-weight: 400; line-height: 1.45; color: var(--muted2); margin: 0; }\n.lead    { font-size: 32px; line-height: 1.55; color: var(--body); margin: 0; }\n.amber { color: var(--amber); }\n.up { color: var(--green); }\n.down { color: var(--red); }\n.blue { color: var(--blue); }\nstrong.k { color: var(--ink); font-weight: 600; }\n\n/* ---- chips / badges ------------------------------------------------- */\n.chip {\n  display: inline-flex; align-items: center; gap: 10px;\n  padding: 9px 18px; border-radius: 9999px;\n  border: 1px solid var(--hair); background: var(--surface);\n  font-size: 24px; font-weight: 500; color: var(--body); white-space: nowrap;\n}\n.chip.mono { font-family: var(--mono); }\n.chip.amber-fill { background: var(--amber); color: var(--color-on-primary); border-color: transparent; font-weight: 600; }\n.chip.blue-line { border-color: color-mix(in oklab, var(--blue) 55%, transparent); color: #9dc1ff; background: color-mix(in oklab, var(--blue) 12%, var(--surface)); }\n.chip.green-line { border-color: color-mix(in oklab, var(--green) 55%, transparent); color: #6fe6b8; background: color-mix(in oklab, var(--green) 12%, var(--surface)); }\n.chip.red-line { border-color: color-mix(in oklab, var(--red) 55%, transparent); color: #ff8a93; background: color-mix(in oklab, var(--red) 12%, var(--surface)); }\n\n.tag-dur {\n  display: inline-flex; align-items: center; gap: 12px; white-space: nowrap;\n  font-family: var(--mono); font-size: 26px; font-weight: 600;\n  color: var(--amber); letter-spacing: 0.5px;\n}\n\n/* ---- cards ---------------------------------------------------------- */\n.card {\n  background: var(--surface);\n  border: 1px solid var(--hair);\n  border-radius: 12px;\n  padding: 32px;\n}\n.card.elev { background: var(--elevated); }\n.card-title { font-size: 30px; font-weight: 600; color: var(--ink); margin: 0 0 10px; }\n.card-body { font-size: 26px; line-height: 1.5; color: var(--body); margin: 0; }\n.card-kicker { font-family: var(--mono); font-size: 24px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin: 0 0 14px; white-space: nowrap; }\n\n/* ---- stat callout --------------------------------------------------- */\n.stat-num { font-family: var(--mono); font-weight: 700; font-size: 80px; line-height: 1; letter-spacing: -1px; color: var(--amber); }\n.stat-label { font-size: 26px; color: var(--muted2); margin-top: 12px; }\n\n/* ---- code block ----------------------------------------------------- */\n.code {\n  background: #0a0c10;\n  border: 1px solid var(--hair);\n  border-radius: 12px;\n  padding: 28px 32px;\n  font-family: var(--mono);\n  font-size: 24px;\n  line-height: 1.62;\n  color: #cdd3dd;\n  overflow: hidden;\n  white-space: pre;\n  tab-size: 2;\n}\n.code.sm { font-size: 24px; line-height: 1.5; }\n.code .cmt { color: #5b6573; }\n.code .kw { color: #ff9f1c; }\n.code .fn { color: #6fb3ff; }\n.code .str { color: #6fe6b8; }\n.code .typ { color: #e0c389; }\n.code .lit { color: #ff8a93; }\n.code-head {\n  display: flex; align-items: center; gap: 12px;\n  font-family: var(--mono); font-size: 24px; color: var(--muted);\n  padding: 4px 2px 16px;\n}\n.code-head .fdot { width: 12px; height: 12px; border-radius: 50%; }\n\n/* annotation pointing at code */\n.anno {\n  border-left: 3px solid var(--amber);\n  padding: 6px 0 6px 22px;\n}\n.anno .a-t { font-size: 27px; font-weight: 600; color: var(--ink); margin: 0 0 6px; }\n.anno .a-b { font-size: 25px; line-height: 1.5; color: var(--muted2); margin: 0; }\n\n/* ---- loop motif (eye / brain / hands) ------------------------------- */\n.loop { display: flex; a 0 1 520px;display:flex;flex-direction:column;align-items:center;text-align:center;padding:36px 28px;\">\n        <div class=\"row\" style=\"gap:12px;align-items:center;margin-bottom:24px;\">\n          <span class=\"aws-ico aws-cont\" style=\"width:52px;height:52px;border-radius:12px;\"><svg viewBox=\"0 0 24 24\" stroke-width=\"2\"><path d=\"M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2\"><\u002Fpath><rect x=\"9\" y=\"3\" width=\"6\" height=\"4\" rx=\"1\"><\u002Frect><path d=\"m9 14 2 2 4-4\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <div style=\"text-align:left;\"><div class=\"card-title\" style=\"margin:0;\">事前準備<\u002Fdiv><div class=\"aws-sub\">環境建置指南<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border-radius:16px;padding:22px;width:300px;height:300px;display:grid;place-items:center;\">\n          <img src=\"13debfd6-880d-4b72-b8d1-df0b4137d878\" width=\"256\" height=\"256\" alt=\"事前準備 QR Code\" style=\"display:block;width:256px;height:256px;image-rendering:pixelated;\">\n        <\u002Fdiv>\n        <a href=\"https://github.com/AdaaWu/aws-iam-identity-center-taipei-init\" class=\"num\" style=\"margin-top:24px;font-size:24px;color:var(--amber);text-decoration:none;word-break:break-all;line-height:1.4;\">github.com/AdaaWu/<br>aws-iam-identity-center-taipei-init<\u002Fa>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n    <div class=\"slug\">DevOps Day Taipei 2026<span class=\"sep\">/<\u002Fspan>資源連結<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 03 AGENDA ============ -->\n  <section class=\"slide\" data-label=\"議程\" data-screen-label=\"Agenda\">\n    <span class=\"eyebrow\"><span class=\"dot\"><\u002Fspan>Agenda<span class=\"seg\">· 90 分鐘工作坊<\u002Fspan><\u002Fspan>\n    <h2 class=\"h-title fade-up\" style=\"margin-top:18px;\">今天我們會動手做的四件事<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:42px;flex:1;align-content:center;\">\n      <div class=\"card fade-up\" style=\"display:flex;gap:26px;align-items:flex-start;\">\n        <div class=\"aws-ico aws-mgmt\" style=\"width:74px;height:74px;border-radius:14px;flex:none;\"><svg viewBox=\"0 0 24 24\" stroke-width=\"2\"><path d=\"M3 12h4l3 8 4-16 3 8h4\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div><div class=\"row\"><span class=\"card-kicker\" style=\"margin:0;\">01 · 觀測 / 眼睛<\u002Fspan><span class=\"spacer\"><\u002Fspan><span class=\"tag-dur\">25 min<\u002Fspan><\u002Fdiv>\n        <div class=\"card-title\" style=\"margin-top:8px;\">數據提取與分析<\u002Fdiv>\n        <p class=\"card-body\">用 Golang 整合 CloudWatch Container Insights 與 Service Connect 原生遙測，即時看 <span class=\"num\">Request / Error Rate<\u002Fspan> 與連線級 Latency。<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card fade-up d1\" style=\"display:flex;gap:26px;align-items:flex-start;\">\n        <div class=\"aws-ico aws-ml\" style=\"width:74px;height:74px;border-radius:14px;flex:none;\"><svg viewBox=\"0 0 24 24\" stroke-width=\"2\"><rect x=\"5\" y=\"5\" width=\"14\" height=\"14\" rx=\"2\"><\u002Frect><rect x=\"9\" y=\"9\" width=\"6\" height=\"6\"><\u002Frect><path d=\"M9 2v3M15 2v3M9 19v3M15 19v3M2 9h3M2 15h3M19 9h3M19 15h3\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div><div class=\"row\"><span class=\"card-kicker\" style=\"margin:0;\">02 · 決策 / 大腦<\u002Fspan><span class=\"spacer\"><\u002Fspan><span class=\"tag-dur\">30 min<\u002Fspan><\u002Fdiv>\n        <div class=\"card-title\" style=\"margin-top:8px;\">AI 決策大腦<\u002Fdiv>\n        <p class=\"card-body\">介接 AWS Bedrock，讓 LLM 依 Error Rate 與 Latency 趨勢給出部署指令，並產出可審計的<strong class=\"k\">推理理由鏈<\u002Fstrong>。<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card fade-up d2\" style=\"display:flex;gap:26px;align-items:flex-start;\">\n        <div class=\"aws-ico aws-cont\" style=\"width:74px;height:74px;border-radius:14px;flex:none;\"><svg viewBox=\"0 0 24 24\" stroke-width=\"2\"><path d=\"M18 11V6a2 2 0 0 0-4 0M14 10V4a2 2 0 0 0-4 0v2M10 10.5V6a2 2 0 0 0-4 0v8\"><\u002Fpath><path d=\"M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div><div class=\"row\"><span class=\"card-kicker\" style=\"margin:0;\">03 · 執行 / 雙手<\u002Fspan><span class=\"spacer\"><\u002Fspan><span class=\"tag-dur\">25 min<\u002Fspan><\u002Fdiv>\n        <div class=\"card-title\" style=\"margin-top:8px;\">基礎設施聯動<\u002Fdiv>\n        <p class=\"card-body\">用 AWS SDK v2 透過 ECS API 動態調整 Blue/Green 的 <span class=\"num\">Desired Count<\u002Fspan> 與權重，搭配 Service Connect 路由完成無縫回滾。<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card fade-up d3\" style=\"display:flex;gap:26px;align-items:flex-start;\">\n        <div class=\"aws-ico aws-net\" style=\"width:74px;height:74px;border-radius:14px;flex:none;\"><svg viewBox=\"0 0 24 24\" stroke-width=\"2\"><path d=\"M12 2v6M12 16v6M2 12h6M16 12h6\"><\u002Fpath><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n        <div><div class=\"row\"><span class=\"card-kicker\" style=\"margin:0;\">04 · 驗證 / 演練<\u002Fspan><span class=\"spacer\"><\u002Fspan><span class=\"tag-dur\">10 min<\u002Fspan><\u002Fdiv>\n        <div class=\"card-title\" style=\"margin-top:8px;\">混沌演練<\u002Fdiv>\n        <p class=\"card-body\">現場注入應用故障，觀察系統如何在<strong class=\"k\">無人介入<\u002Fstrong>下，透過 AIOps 決策迴路完成智慧故障隔離與流量收斂。<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"slug\">DevOps Day Taipei 2026<span class=\"sep\">/<\u002Fspan>Agenda<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 04 THESIS ============ -->\n  <section class=\"slide grid\" data-label=\"核心命題\" data-screen-label=\"Thesis\">\n    <span class=\"eyebrow\"><span class=\"dot\"><\u002Fspan>The real problem<\u002Fspan>\n    <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;max-width:1500px;\">\n      <h2 class=\"h-big fade-up\" style=\"font-size:66px;line-height:1.22;\">金絲雀發布真正的難點，<br>已經不是<span style=\"color:var(--muted);\">流量怎麼切<\u002Fspan>，<br>而是 <span class=\"amber\">「何時切」<\u002Fspan> 與 <span class=\"amber\">「何時回滾」<\u002Fspan>。<\u002Fh2>\n      <div class=\"row fade-up d2\" style=\"gap:40px;margin-top:60px;flex-wrap:wrap;\">\n        <div style=\"max-width:520px;\">\n          <div class=\"num\" style=\"font-size:24px;color:var(--muted);letter-spacing:1px;\">傳統做法<\u002Fdiv>\n          <p class=\"lead\" style=\"margin-top:10px;font-size:30px;\">靠人盯 Dashboard、靠固定門檻、靠半夜被叫起來決定要不要 rollback。<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"width:1px;align-self:stretch;background:var(--hair);\"><\u002Fdiv>\n        <div style=\"max-width:560px;\">\n          <div class=\"num\" style=\"font-size:24px;color:var(--amber);letter-spacing:1px;\">這場工作坊<\u002Fdiv>\n          <p class=\"lead\" style=\"margin-top:10px;font-size:30px;\">把判斷邏輯交給一個有<strong class=\"k\">遙測數據 + LLM 推理<\u002Fstrong>的決策迴路，讓它替你按下 promote / rollback。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"num fade-up d3\" style=\"font-size:24px;color:var(--muted);\">跳過基礎概念 — 直接進開發者視角的實作。<\u002Fp>\n    <div class=\"slug\">DevOps Day Taipei 2026<span class=\"sep\">/<\u002Fspan>命題<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 05 METAPHOR ============ -->\n  <section class=\"slide\" data-label=\"心智模型\" data-screen-label=\"Metaphor\">\n    <span class=\"eyebrow\"><span class=\"dot\"><\u002Fspan>Mental model<span class=\"seg\">· 貫穿全場的比喻<\u002Fspan><\u002Fspan>\n    <h2 class=\"h-title fade-up\" style=\"margin-top:16px;\">把這套系統想成一個人：眼睛、大腦、雙手<\u002Fh2>\n    <div class=\"row\" style=\"flex:1;justify-content:center;align-items:center;gap:0;\">\n      <div class=\"loop\">\n        <div class=\"loop-node active fade-up\">\n          <div class=\"loop-orb\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><path d=\"M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div class=\"ln-name\">眼睛<\u002Fdiv>\n          <div class=\"ln-role\">CloudWatch<br>看見遙測數據<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"loop-arrow\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke-width=\"2\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div class=\"loop-node active fade-up d1\">\n          <div class=\"loop-orb\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke-width=\"2\"><rect x=\"5\" y=\"5\" width=\"14\" height=\"14\" rx=\"2\"><\u002Frect><rect x=\"9\" y=\"9\" width=\"6\" height=\"6\"><\u002Frect><path d=\"M9 2v3M15 2v3M9 19v3M15 19v3M2 9h3M2 15h3M19 9h3M19 15h3\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div class=\"ln-name\">大腦<\u002Fdiv>\n          <div class=\"ln-role\">Bedrock LLM<br>判斷並推理<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"loop-arrow\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke-width=\"2\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div class=\"loop-node active fade-up d2\">\n          <div class=\"loop-orb\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke-width=\"2\"><path d=\"M18 11V6a2 2 0 0 0-4 0M14 10V4a2 2 0 0 0-4 0v2M10 10.5V6a2 2 0 0 0-4 0v8\"><\u002Fpath><path d=\"M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div class=\"ln-name\">雙手<\u002Fdiv>\n          <div class=\"ln-role\">ECS UpdateService<br>實際動手調整<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"lead fade-up d3\" style=\"text-align:center;font-size:30px;color:var(--muted2);\">三者組成一個<strong class=\"k amber\">閉環<\u002Fstrong>：看見 → 判斷 → 執行 →（再回頭看）— 這就是 AIOps 決策迴路。<\u002Fp>\n    <div class=\"slug\">DevOps Day Taipei 2026<span class=\"sep\">/<\u002Fspan>心智模型<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 06 ARCHITECTURE ============ -->\n  <section class=\"slide pad-tight\" data-label=\"架構\" data-screen-label=\"Architecture\">\n    <span clas Taipei 2026<span class=\"sep\">/<\u002Fspan>觀測 · CloudWatch<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 09 COLLECTOR OVERVIEW ============ -->\n  <section class=\"slide\" data-label=\"Collector\" data-screen-label=\"Collector\">\n    <span class=\"eyebrow\"><span class=\"dot\"><\u002Fspan>collector.go<span class=\"seg\">· 把兩個資料源縫成一張健康快照<\u002Fspan><\u002Fspan>\n    <h2 class=\"h-title fade-up\" style=\"font-size:46px;margin-top:12px;\">一個 <span class=\"num\">ServiceMetric<\u002Fspan>，兩種視角<\u002Fh2>\n    <div class=\"row\" style=\"flex:1;gap:26px;margin-top:30px;align-items:stretch;\">\n      <div class=\"card fade-up\" style=\"flex:1;display:flex;flex-direction:column;\">\n        <div class=\"row\" style=\"gap:14px;align-items:center;margin-bottom:18px;\"><div class=\"aws-ico aws-mgmt\" style=\"width:54px;height:54px;border-radius:12px;\"><svg viewBox=\"0 0 24 24\" stroke-width=\"2\"><path d=\"M3 12h4l3 8 4-16 3 8h4\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div class=\"card-title\" style=\"margin:0;\">Service Connect<br><span class=\"aws-sub\">Envoy sidecar · 流量視角 — canary 決策核心<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <ul style=\"margin:0;padding-left:26px;font-size:25px;line-height:1.75;color:var(--body);\">\n          <li><span class=\"num up\">RequestCount<\u002Fspan> · <span class=\"num down\">ErrorCount<\u002Fspan> → <strong class=\"k\">ErrorRate<\u002Fstrong><\u002Fli>\n          <li><span class=\"num\">P50 / P99 / Avg Latency<\u002Fspan><\u002Fli>\n          <li><span class=\"num\">Active / New Connections<\u002Fspan><\u002Fli>\n        <\u002Ful>\n        <div class=\"spacer\"><\u002Fdiv>\n        <p class=\"card-body\" style=\"margin-top:16px;color:var(--muted);font-size:24px;\">來源：<span class=\"num\">AWS/ECS<\u002Fspan> · TargetResponseTime / 5XX Count<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"card fade-up d1\" style=\"flex:1;display:flex;flex-direction:column;\">\n        <div class=\"row\" style=\"gap:14px;align-items:center;margin-bottom:18px;\"><div class=\"aws-ico aws-cont\" style=\"width:54px;height:54px;border-radius:12px;\"><svg viewBox=\"0 0 24 24\" stroke-width=\"2\"><path d=\"M4 8l8-4 8 4-8 4-8-4Z\"><\u002Fpath><path d=\"M4 8v8l8 4 8-4V8\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div class=\"card-title\" style=\"margin:0;\">Container Insights<br><span class=\"aws-sub\">資源視角 — 補充健康訊號<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <ul style=\"margin:0;padding-left:26px;font-size:25px;line-height:1.75;color:var(--body);\">\n          <li><span class=\"num\">CpuUtilized<\u002Fspan>（vCPU）<\u002Fli>\n          <li><span class=\"num\">MemoryUtilized<\u002Fspan>（MB）<\u002Fli>\n          <li><span class=\"num\">RunningTaskCount<\u002Fspan><\u002Fli>\n        <\u002Ful>\n        <div class=\"spacer\"><\u002Fdiv>\n        <p class=\"card-body\" style=\"margin-top:16px;color:var(--muted);font-size:24px;\">來源：<span class=\"num\">ECS/ContainerInsights<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"card fade-up d2\" style=\"flex:0.9;background:var(--elevated);display:flex;flex-direction:column;justify-content:center;\">\n        <div class=\"card-kicker\">容錯設計<\u002Fdiv>\n        <p class=\"card-body\" style=\"font-size:26px;\">用 <span class=\"num\">SCDataAvailable<\u002Fspan> / <span class=\"num\">CIDataAvailable<\u002Fspan> 標記來源。<\u002Fp>\n        <p class=\"card-body\" style=\"font-size:26px;margin-top:16px;\">單一來源失敗仍能運作；<strong class=\"k amber\">兩個都沒數據才報錯<\u002Fstrong>。<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"slug\">DevOps Day Taipei 2026<span class=\"sep\">/<\u002Fspan>觀測<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 10 SC CONCURRENCY CODE ============ -->\n  <section class=\"slide\" data-label=\"並發抓取\" data-screen-label=\"SC Code\">\n    <span class=\"eyebrow\"><span class=\"dot\"><\u002Fspan>collectServiceConnect()<span class=\"seg\">· goroutine 並發抓取<\u002Fspan><\u002Fspan>\n    <h2 class=\"h-title fade-up\" style=\"font-size:46px;margin-top:12px;\">每個指標一條 goroutine，channel 收斂<\u002Fh2>\n    <div class=\"row\" style=\"flex:1;gap:40px;margin-top:28px;align-items:stretch;\">\n      <div class=\"code fade-up\" style=\"flex:1.25;\">\n<span class=\"cmt\">// 5 個 Sum 指標 + 2 個百分位，全部並發<\u002Fspan>\nch := <span class=\"kw\">make<\u002Fspan>(<span class=\"kw\">chan<\u002Fspan> responseDTO, <span class=\"lit\">7<\u002Fspan>)\n<span class=\"kw\">for<\u002Fspan> _, q := <span class=\"kw\">range<\u002Fspan> basics {       <span class=\"cmt\">// RequestCount, 5XX…<\u002Fspan>\n  <span class=\"kw\">go func<\u002Fspan>(key, metric, stat <span class=\"typ\">string<\u002Fspan>) {\n    v, err := c.<span class=\"fn\">getMetricStatistic<\u002Fspan>(ctx, ns, metric, stat, dims)\n    ch &lt;- responseDTO{name: key, value: v, err: err}\n  }(q.key, q.metric, q.stat)\n}\n<span class=\"kw\">for range<\u002Fspan> <span class=\"lit\">7<\u002Fspan> {\n  r := &lt;-ch\n  <span class=\"kw\">if<\u002Fspan> r.err != <span class=\"kw\">nil<\u002Fspan> { <span class=\"kw\">continue<\u002Fspan> }   <span class=\"cmt\">// 單一失敗不影響整體<\u002Fspan>\n  <span class=\"cmt\">// …switch r.name 寫回 result<\u002Fspan>\n}\n<span class=\"cmt\">// 換算百分比 → canary 判定的核心訊號<\u002Fspan>\nresult.ErrorRate = result.ErrorCount / result.RequestCount * <span class=\"lit\">100<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"flex:.85;display:flex;flex-direction:column;gap:26px;justify-content:center;\">\n        <div class=\"anno fade-up d1\"><p class=\"a-t\">並發，不是序列<\u002Fp><p class=\"a-b\">7 個 CloudWatch 查詢同時發出，整輪收斂時間取決於最慢的一個。<\u002Fp><\u002Fdiv>\n        <div class=\"anno fade-up d2\"><p class=\"a-t\">局部失敗可容忍<\u002Fp><p class=\"a-b\"><span class=\"num\">r.err != nil<\u002Fspan> 時略過該指標，其餘照常寫回，避免一個指標拖垮整輪。<\u002Fp><\u002Fdiv>\n        <div class=\"anno fade-up d3\"><p class=\"a-t\">ErrorRate 自己算<\u002Fp><p class=\"a-b\">用 <span class=\"num\">5XX / Request<\u002Fspan> 換算百分比 — 這就是 canary 判定的核心訊號。<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"slug\">DevOps Day Taipei 2026<span class=\"sep\">/<\u002Fspan>觀測<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 11 METRICS + OUTPUT ============ -->\n  <section class=\"slide\" data-label=\"讀到什麼\" data-screen-label=\"SC Metrics\">\n    <span class=\"eyebrow\"><span class=\"dot\"><\u002Fspan>我們到底讀了什麼<span class=\"seg\">· CloudWatch metric 對應<\u002Fspan><\u002Fspan>\n    <h2 class=\"h-title fade-up\" style=\"font-size:46px;margin-top:12px;\">遙測欄位 → 一行可讀的健康快照<\u002Fh2>\n    <div class=\"row\" style=\"flex:1;gap:36px;margin-top:28px;align-items:stretch;\">\n      <table class=\"cmp fade-up\" style=\"flex:1.1;align-self:flex-start;\">\n        <thead><tr><th>結果欄位<\u002Fth><th>CloudWatch Metric<\u002Fth><th>Stat<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td class=\"ccell num\">RequestCount<\u002Ftd><td class=\"ccell num\">RequestCount<\u002Ftd><td class=\"ccell num\">Sum<\u002Ftd><\u002Ftr>\n          <tr><td class=\"ccell num\">ErrorCount<\u002Ftd><td class=\"ccell num\">HTTPCode_Target_5XX_Count<\u002Ftd><td class=\"ccell num\">Sum<\u002Ftd><\u002Ftr>\n          <tr><td class=\"ccell num\">P50 / P99<\u002Ftd><td class=\"ccell num\">TargetResponseTime<\u002Ftd><td class=\"ccell num\">p50 / p99<\u002Ftd><\u002Ftr>\n          <tr><td class=\"ccell num\">CPUUtilized<\u002Ftd><td class=\"ccell num\">CpuUtilized<\u002Ftd><td class=\"ccell num\">Average<\u002Ftd><\u002Ftr>\n          <tr><td class=\"ccell num\">MemoryUtilized<\u002Ftd><td class=\"ccell num\">MemoryUtilized<\u002Ftd><td class=\"ccell num\">Average<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n      <div style=\"flex:.9;display:flex;flex-direction:column;gap:24px;justify-content:center;\">\n        <div class=\"card fade-up d1\" style=\"background:#0a0c10;\">\n          <div class=\"card-kicker\">m.String() — 一輪輸出<\u002Fdiv>\n          <p class=\"num\" style=\"font-size:24px;line-height:1.7;color:#cdd3dd;margin:0;\">[api-green][<span class=\"up\">SC+CI<\u002Fspan>] reqs=<span class=\"amber\">1240<\u002Fspan> errs=<span class=\"down\">86<\u002Fspan><br>errRate=<span class=\"down\">6.94%<\u002Fspan> p50=12.0ms p99=210.5ms<br>cpu=0.182 mem=148MB<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"anno fade-up d2\"><p class=\"a-t\">多個 datapoint 取最新<\u002Fp><p class=\"a-b\">依 Timestamp 排序取第一筆，避免讀到過期的聚合視窗。<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"slug\">DevOps Day Taipei 2026<span class=\"sep\">/<\u002Fspan>觀測<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 12 SECTION 2 DIVIDER ============ -->\n  <section class=\"slide grid\" data-label=\"§2 決策\" data-screen-label=\"Section 2\">\n    <div class=\"row\"><span class=\"eyebrow\"><span class=\"dot\"><\u002Fspan>Section 02 / 04<span class=\"seg\">· 大腦<\u002Fspan><\u002Fspan><span class=\"spacer\"><\u002Fspan><span class=\"tag-dur\">30 min<\u002Fspan><\u002Fdiv>\n    <div class=\"row\" style=\"flex:1;align-items:center;gap:72px;\">\n      <div style=\"flex:1;\">\n        <div class=\"num fade-up\" style=\"font-size:200px;line-height:.9;color:var(--amber);letter-spacing:-6px;\">02<\u002Fdiv>\n        <h2 class=\"h-big fade-up d1\" style=\"font-size:72px;margin-top:8px;\">AI 決策大腦<\u002Fh2>\n        <p class=\"lead fade-up d2\" style=\"margin-top:24px;max-width:840px;font-size:33px;\">介接 AWS Bedrock，讓 LLM 依 Error Rate 與 Latency 趨勢給出部署指令，並產出可審計的 <strong class=\"k amber\">理由鏈（Chain-of-Thought）<\u002Fstrong>。<\u002Fp>\n        <div class=\"row fade-up d3\" style=\"gap:14px;margin-top:30px;flex-wrap:wrap;\">\n          <span class=\"chip mono\">Claude Haiku 4.5<\u002Fspan><span class=\"chip mono\">Amazon Nova（備案）<\u002Fspan><span class=\"chip mono\">JSON 決策輸出<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:none;width:300px;display:flex;flex-direction:column;align-items:center;gap:34px;\">\n        <div class=\"loop-node active pulse-active\">\n          <div class=\"loop-orb\" style=\"width:200px;height:200px;\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke-width=\"1.8\" style=\"width:92px;height:92px;\"><rect x=\"5\" y=\"5\" width=\"14\" height=\"14\" rx=\"2\"><\u002Frect><rect x=\"9.5\" y=\"9.5\" width=\"5\" height=\"5\"><\u002Frect><path d=\"M9 2v3M15 2v3M9 19v3M15 19v3M2 9h3M2 15h3M19 9h3M19 15h3\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div class=\"ln-name\" style=\"font-size:32px;\">大腦 · Bedrock<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"row\" style=\"gap:18px;opacity:.4;\">\n          <div class=\"loop-orb\" style=\"width:64px;height:64px;\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke-width=\"2\" style=\"width:30px;height:30px;\"><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><path d=\"M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div class=\"loop-orb\" style=\"width:64px;height:64px;\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke-width=\"2\" style=\"width:30px;height:30px;\"><path d=\"M18 11V6a2 2 0 0 0-4 0M14 10V4a2 2 0 0 0-4 0v2M10 10.5V6a2 2 0 0 0-4 0v8\"><\u002Fpath><path d=\"M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"slug\">DevOps Day Taipei 2026<span class=\"sep\">/<\u002Fspan>決策 · Bedrock<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 13 DECISION ENGINE CODE ============ -->\n  <section class=\"slide\" data-label=\"決策引擎\" data-screen-label=\"Engine Code\">\n    <span class=\"eyebrow\"><span class=\"dot\"><\u002Fspan>decision.go<span class=\"seg\">· Bedrock Converse API<\u002Fspan><\u002Fspan>\n    <h2 class=\"h-title fade-up\" style=\"font-size:46px;margin-top:12px;\">用 Converse 統一介面，要回一個結構化決策<\u002Fh2>\n    <div class=\"row\" style=\"flex:1;gap:40px;margin-top:26px;align-items:stretch;\">\n      <div class=\"code sm fade-up\" style=\"flex:1.3;\">\n<span class=\"kw\">type<\u002Fspan> <span class=\"typ\">Decision<\u002Fspan> <span class=\"kw\">struct<\u002Fspan> {\n  Signal    <span class=\"typ\">string<\u002Fspan> <span class=\"str\">`json:\"signal\"`<\u002Fspan>    <span class=\"cmt\">// 安全/普通/危險/超危險<\u002Fspan>\n  Reasoning <span class=\"typ\">string<\u002Fspan> <span class=\"str\">`json:\"reasoning\"`<\u002Fspan> <span class=\"cmt\">// 可審計理由鏈<\u002Fspan>\n}\n<span class=\"kw\">func<\u002Fspan> (e *<span class=\"typ\">Engine<\u002Fspan>) <span class=\"fn\">Evaluate<\u002Fspan>(ctx, prompt) (*<span class=\"typ\">Decision<\u002Fspan>, <span class=\"typ\">error<\u002Fspan>) {\n  out, _ := e.bedrock.<span class=\"fn\">Converse<\u002Fspan>(ctx, &amp;<span class=\"typ\">ConverseInput<\u002Fspan>{\n    ModelId: aws.<span class=\"fn\">String<\u002Fspan>(e.modelID),   <span class=\"cmt\">// ← 換 model 即切換<\u002Fspan>\n    Messages: []types.<span class=\"typ\">Message<\u002Fspan>{{\n      Role: types.ConversationRoleUser,\n      Content: []types.<span class=\"typ\">ContentBlock<\u002Fspan>{\n        &amp;types.<span class=\"typ\">ContentBlockMemberText<\u002Fspan>{Value: prompt}},\n    }},\n    InferenceConfig: &amp;types.<span class=\"typ\">InferenceConfiguration<\u002Fspan>{\n      MaxTokens: aws.<span class=\"fn\">Int32<\u002Fspan>(<span class=\"lit\">1024<\u002Fspan>)},\n  })\n  msg := out.Output.(*types.<span class=\"typ\">ConverseOutputMemberMessage<\u002Fspan>)\n  <span class=\"kw\">return<\u002Fspan> <span class=\"fn\">parseDecision<\u002Fspan>(msg.Value.Content)  <span class=\"cmt\">// text → Decision<\u002Fspan>\n}\n      <\u002Fdiv>\n      <div style=\"flex:.82;display:flex;flex-direction:column;gap:24px;justify-content:center;\">\n        <div class=\"anno fade-up d1\"><p class=\"a-t\">Converse 統一介面<\u002Fp><p class=\"a-b\">用同一套 <span class=\"num\">Message / ContentBlock<\u002Fspan> 結構，不必為每個模型手刻 request body。<\u002Fp><\u002Fdiv>\n        <div class=\"anno fade-up d2\"><p class=\"a-t\">輸出仍是結構<\u002Fp><p class=\"a-b\">取出 <span class=\"num\">text<\u002Fspan> 後 <span class=\"num\">json.Unmarshal<\u002Fspan> 成 <span class=\"num\">{signal, reasoning}<\u002Fspan>，直接拿 signal 驅動部署。<\u002Fp><\u002Fdiv>\n        <div class=\"anno fade-up d3\"><p class=\"a-t\">模型可抽換<\u002Fp><p class=\"a-b\">Converse 抹平格式差異，<span class=\"num\">只改 modelID<\u002Fspan> 就能在 Haiku / Nova 間切換。<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"slug\">DevOps Day Taipei 2026<span class=\"sep\">/<\u002Fspan>決策<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 14 PROMPT / CoT ============ -->\n  <section class=\"slide\" data-label=\"Prompt 設計\" data-screen-label=\"Prompt\">\n    <span class=\"eyebrow\"><span class=\"dot\"><\u002Fspan>Prompt 設計<span class=\"seg\">· 角色 → 規則 → 嚴格輸出<\u002Fspan><\u002Fspan>\n    <h2 class=\"h-title fade-up\" style=\"font-size:46px;margin-top:12px;\">逼 LLM 只回 JSON，並交出推理過程<\u002Fh2>\n    <div class=\"row\" style=\"flex:1;gap:36px;margin-top:26px;align-items:stretch;\">\n      <div class=\"code sm fade-up\" style=\"flex:1.05;\">\n<span class=\"cmt\"># 角色<\u002Fspan>\n你是一個危險程度決策者，依情境給出決策\n\n<span class=\"cmt\"># 指標（由遙測填入）<\u002Fspan>\ndanger_rate: <span class=\"amber\">75<\u002Fspan>   <span class=\"cmt\">// ← errorRate / latency 趨勢<\u002Fspan>\n\n<span class=\"cmt\"># 規則（依序，第一個符合的為結果）<\u002Fspan>\n&gt; 80 超危險  ·  &gt; 50 危險  ·  &gt; 25 普通  ·  其餘 安全\n\n<span class=\"cmt\"># 輸出（非常重要）<\u002Fspan>\n只能輸出一個 JSON，禁止 markdown / 程式碼區塊\n{<span class=\"str\">\"signal\"<\u002Fspan>:<span class=\"str\">\"…\"<\u002Fspan>, <span class=\"str\">\"reasoning\"<\u002Fspan>:<span class=\"str\">\"逐步推理過程\"<\u002Fspan>}\n      <\u002Fdiv>\n      <div style=\"flex:.95;display:flex;flex-direction:column;gap:22px;justify-content:center;\">\n        <div class=\"card fade-up d1\" style=\"background:#0a0c10;\">\n          <div class=\"card-kicker\">LLM 回傳<\u002Fdiv>\n          <p class=\"num\" style=\"font-size:24px;line-height:1.7;color:#cdd3dd;margin:0;\">{ <span class=\"str\">\"signal\"<\u002Fspan>: <span class=\"down\">\"危險\"<\u002Fspan>,<br>&nbsp;&nbsp;<span class=\"str\">\"reasoning\"<\u002Fspan>: <span class=\"str\">\"errRate 6.9% 且 p99 升高，<\u002Fspan><br>&nbsp;&nbsp;<span class=\"str\">超過 50 門檻 → 危險，建議回滾\"<\u002Fspan> }<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"anno fade-up d2\"><p class=\"a-t\">對應到部署動作<\u002Fp><p class=\"a-b\"><span class=\"num up\">安全/普通 → Promote<\u002Fspan> · <span class=\"num down\">危險/超危險 → Rollback<\u002Fspan>。<\u002Fp><\u002Fdiv>\n        <div class=\"anno fade-up d3\"><p class=\"a-t\">嚴格格式 = 可解析<\u002Fp><p class=\"a-b\">禁止 markdown 與自我修正，避免污染 <span class=\"num\">json.Unmarshal<\u002Fspan>。<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"slug\">DevOps Day Taipei 2026<span class=\"sep\">/<\u002Fspan>決策<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 15 HAIKU vs NOVA ============ -->\n  <section class=\"slide\" data-label=\"Haiku vs Nova\" data-screen-label=\"Model Swap\">\n    <span class=\"eyebrow\"><span class=\"dot\"><\u002Fspan>模型備案<span class=\"seg\">· 同一套 prompt，換 model<\u002Fspan><\u002Fspan>\n    <h2 class=\"h-title fade-up\" style=\"font-size:46px;margin-top:12px;\">Haiku 不可用？換 Amazon Nova 即可<\u002Fh2>\n    <div class=\"row\" style=\"flex:1;gap:26px;margin-top:28px;align-items:stretch;\">\n      <div class=\"card fade-up\" style=\"flex:1;display:flex;flex-direction:column;\">\n        <div class=\"row\" style=\"align-items:center;gap:12px;\"><span class=\"chip amber-fill mono\">主要<\u002Fspan><div class=\"card-title\" style=\"margin:0;\">Claude Haiku 4.5<\u002Fdiv><\u002Fdiv>\n        <p class=\"num\" style=\"font-size:24px;color:var(--muted);margin:14px 0 18px;\">global.anthropic.claude-haiku-4-5<\u002Fp>\n        <ul style=\"margin:0;padding-left:24px;font-size:24px;line-height:1.7;color:var(--body);\">\n          <li>request：<span class=\"num\">anthropic_version<\u002Fspan>、<span class=\"num\">max_tokens<\u002Fspan><\u002Fli>\n          <li>messages：<span class=\"num\">[{role, content}]<\u002Fspan><\u002Fli>\n          <li>response：<span class=\"num\">content[].text<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"card fade-up d1\" style=\"flex:1;display:flex;flex-direction:column;\">\n        <div class=\"row\" style=\"align-items:center;gap:12px;\"><span class=\"chip green-line mono\">備案<\u002Fspan><div class=\"card-title\" style=\"margin:0;\">Amazon Nova 2 Lite<\u002Fdiv><\u002Fdiv>\n        <p class=\"num\" style=\"font-size:24px;color:var(--muted);margin:14px 0 18px;\">global.amazon.nova-2-lite<\u002Fp>\n        <ul style=\"margin:0;padding-left:24px;font-size:24px;line-height:1.7;color:var(--body);\">\n          <li>content 為<span class=\"num\">陣列<\u002Fspan>：<span class=\"num\">[{text}]<\u002Fspan><\u002Fli>\n          <li>用 <span class=\"num\">inferenceConfig.max_new_tokens<\u002Fspan><\u002Fli>\n          <li>response：<span class=\"num\">output.message.content[].text<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"card fade-up d2\" style=\"flex:.78;background:var(--elevated);display:flex;flex-direction:column;justify-content:center;\">\n        <div class=\"card-kicker\">不變的部分<\u002Fdiv>\n        <p class=\"card-body\" style=\"font-size:25px;\">Prompt、決策規則、<span class=\"num\">Decision<\u002Fspan> 結構<strong class=\"k amber\"> 完全相同<\u002Fstrong>。<\u002Fp>\n        <p class=\"card-body\" style=\"font-size:25px;margin-top:14px;\">只換 <span class=\"num\">modelID<\u002Fspan> 與 request / response 的 DTO 封裝。<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"slug\">DevOps Day Taipei 2026<span class=\"sep\">/<\u002Fspan>決策<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 16 SECTION 3 DIVIDER ============ -->\n  <section class=\"slide grid\" data-label=\"§3 執行\" data-screen-label=\"Section 3\">\n    <div class=\"row\"><span class=\"eyebrow\"><span class=\"dot\"><\u002Fspan>Section 03 / 04<span class=\"seg\">· 雙手<\u002Fspan><\u002Fspan><span class=\"spacer\"><\u002Fspan><span class=\"tag-dur\">25 min<\u002Fspan><\u002Fdiv>\n    <div class=\"row\" style=\"flex:1;align-items:center;gap:72px;\">\n      <div style=\"flex:1;\">\n        <div class=\"num fade-up\" style=\"font-size:200px;line-height:.9;color:var(--amber);letter-spacing:-6px;\">03<\u002Fdiv>\n        <h2 class=\"h-big fade-up d1\" style=\"font-size:72px;margin-top:8px;\">基礎設施聯動<\u002Fh2>\n        <p class=\"lead fade-up d2\" style=\"margin-top:24px;max-width:840px;font-size:33px;\">用 AWS SDK v2 透過 ECS API 動態調整 Blue/Green 的 <strong class=\"k\">Desired Count<\u002Fstrong>，搭配 Service Connect 路由達成<strong class=\"k amber\">無縫自動回滾<\u002Fstrong>。<\u002Fp>\n        <div class=\"row fade-up d3\" style=\"gap:14px;margin-top:30px;flex-wrap:wrap;\">\n          <span class=\"chip mono\">UpdateService<\u002Fspan><span class=\"chip mono\">DesiredCount<\u002Fspan><span class=\"chip mono\">Namespace 路由<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:none;width:300px;display:flex;flex-direction:column;align-items:center;gap:34px;\">\n        <div class=\"loop-node active pulse-active\">\n          <div class=\"loop-orb\" style=\"width:200px;height:200px;\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke-width=\"1.8\" style=\"width:92px;height:92px;\"><path d=\"M18 11V6a2 2 0 0 0-4 0M14 10V4a2 2 0 0 0-4 0v2M10 10.5V6a2 2 0 0 0-4 0v8\"><\u002Fpath><path d=\"M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div class=\"ln-name\" style=\"font-size:32px;\">雙手 · ECS API<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"row\" style=\"gap:18px;opacity:.4;\">\n          <div class=\"loop-orb\" style=\"width:64px;height:64px;\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke-width=\"2\" style=\"width:30px;height:30px;\"><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><path d=\"M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div class=\"loop-orb\" style=\"width:64px;height:64px;\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke-width=\"2\" style=\"width:30px;height:30px;\"><rect x=\"5\" y=\"5\" width=\"14\" height=\"14\" rx=\"2\"><\u002Frect><rect x=\"9.5\" y=\"9.5\" width=\"5\" height=\"5\"><\u002Frect><\u002Fsvg><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"slug\">DevOps Day Taipei 2026<span class=\"sep\">/<\u002Fspan>執行 · ECS<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 17 ACTUATOR CODE ============ -->\n  <section class=\"slide\" data-label=\"Actuator\" data-screen-label=\"Actuator\">\n    <span class=\"eyebrow\"><span class=\"dot\"><\u002Fspan>actuator/ecs.go<span class=\"seg\">· 三種動作，一個 switch<\u002Fspan><\u002Fspan>\n    <h2 class=\"h-title fade-up\" style=\"font-size:46px;margin-top:12px;\">把決策訊號翻成 ECS 操作<\u002Fh2>\n    <div class=\"row\" style=\"flex:1;gap:40px;margin-top:26px;align-items:stretch;\">\n      <div class=\"code fade-up\" style=\"flex:1.25;\">\n<span class=\"kw\">type<\u002Fspan> <span class=\"typ\">Action<\u002Fspan> <span class=\"typ\">string<\u002Fspan>\n<span class=\"kw\">const<\u002Fspan> (\n  <span class=\"up\">Promote<\u002Fspan>  <span class=\"typ\">Action<\u002Fspan> = <span class=\"str\">\"promote\"<\u002Fspan>\n  <span class=\"down\">Rollback<\u002Fspan> <span class=\"typ\">Action<\u002Fspan> = <span class=\"str\">\"rollback\"<\u002Fspan>\n  Hold     <span class=\"typ\">Action<\u002Fspan> = <span class=\"str\">\"hold\"<\u002Fspan>\n)\n\n<span class=\"kw\">func<\u002Fspan> (a *<span class=\"typ\">ECSActuator<\u002Fspan>) <span class=\"fn\">Execute<\u002Fspan>(ctx, action) <span class=\"typ\">error<\u002Fspan> {\n  <span class=\"kw\">switch<\u002Fspan> action {\n  <span class=\"kw\">case<\u002Fspan> <span class=\"up\">Promote<\u002Fspan>:  <span class=\"kw\">return<\u002Fspan> a.<span class=\"fn\">promote<\u002Fspan>(ctx)   <span class=\"cmt\">// 綠↑ 藍↓<\u002Fspan>\n  <span class=\"kw\">case<\u002Fspan> <span class=\"down\">Rollback<\u002Fspan>: <span class=\"kw\">return<\u002Fspan> 002Fspan>(ctx, &amp;UpdateServiceInput{\n    Service: a.GreenService, DesiredCount: aws.<span class=\"fn\">Int32<\u002Fspan>(<span class=\"up\">3<\u002Fspan>),\n  })                                  <span class=\"cmt\">// 綠：擴張接手<\u002Fspan>\n  a.Client.<span class=\"fn\">UpdateService<\u002Fspan>(ctx, &amp;UpdateServiceInput{\n    Service: a.BlueService,  DesiredCount: aws.<span class=\"fn\">Int32<\u002Fspan>(<span class=\"lit\">0<\u002Fspan>),\n  })                                  <span class=\"cmt\">// 藍：退場<\u002Fspan>\n}\n\n<span class=\"kw\">func<\u002Fspan> (a *<span class=\"typ\">ECSActuator<\u002Fspan>) <span class=\"fn\">rollback<\u002Fspan>(ctx) <span class=\"typ\">error<\u002Fspan> {\n  a.Client.<span class=\"fn\">UpdateService<\u002Fspan>(ctx, &amp;UpdateServiceInput{\n    Service: a.GreenService, DesiredCount: aws.<span class=\"fn\">Int32<\u002Fspan>(<span class=\"down\">0<\u002Fspan>),\n  })                                  <span class=\"cmt\">// 綠出事：直接縮回 0<\u002Fspan>\n}\n      <\u002Fdiv>\n      <div style=\"flex:.85;display:flex;flex-direction:column;gap:22px;justify-content:center;\">\n        <div class=\"card fade-up d1\">\n          <div class=\"card-kicker up\">Promote<\u002Fdiv>\n          <div class=\"row\" style=\"gap:16px;align-items:center;margin-top:6px;\"><span class=\"chip blue-line mono\" style=\"flex-direction:column;align-items:center;gap:3px;line-height:1.15;padding:12px 20px;\"><span>api-blue<\u002Fspan><span>3 → <span class=\"down\">0<\u002Fspan><\u002Fspan><\u002Fspan><svg viewBox=\"0 0 24 12\" style=\"width:38px;stroke:var(--green);fill:none;stroke-width:2\"><path d=\"M2 6h18M16 2l5 4-5 4\"><\u002Fpath><\u002Fsvg><span class=\"chip green-line mono\" style=\"flex-direction:column;align-items:center;gap:3px;line-height:1.15;padding:12px 20px;\"><span>api-green<\u002Fspan><span>0 → <span class=\"up\">3<\u002Fspan><\u002Fspan><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card fade-up d2\">\n          <div class=     <h2 class=\"h-title fade-up\" style=\"font-size:46px;margin-top:12px;\">這套做法的四個象限<\u002Fh2>\n    <div class=\"swot fade-up d1\" style=\"margin-top:26px;flex:1;align-content:center;\">\n      <div class=\"q s\"><h4><span class=\"badge\">S<\u002Fspan>優勢 Strengths<\u002Fh4><ul><li>決策訊號就是<strong class=\"k\">原生遙測<\u002Fstrong>，不需另接系統<\u002Fli><li>回滾＝改 DesiredCount，<strong class=\"k\">貼近開發者<\u002Fstrong><\u002Fli><li>理由鏈<strong class=\"k\">可審計<\u002Fstrong>，事後能回放決策<\u002Fli><\u002Ful><\u002Fdiv>\n      <div class=\"q w\"><h4><span class=\"badge\">W<\u002Fspan>劣勢 Weaknesses<\u002Fh4><ul><li>流量粒度受<strong class=\"k\">任務副本數<\u002Fstrong>限制，非任意 %<\u002Fli><li>依賴 Bedrock <strong class=\"k\">額度與延遲<\u002Fstrong><\u002Fli><li>LLM 決策需要<strong class=\"k\">護欄<\u002Fstrong>與門檻把關<\u002Fli><\u002Ful><\u002Fdiv>\n      <div class=\"q o\"><h4><span class=\"badge\">O<\u002Fspan>機會 Opportunities<\u002Fh4><ul><li>同一迴路可<strong class=\"k\">水平擴到多服務<\u002Fstrong><\u002Fli><li>可加更多訊號：CPU / Mem / 業務 KPI<\u002Fli><li>模型可隨時<strong class=\"k\">升級替換<\u002Fstrong><\u002Fli><\u002Ful><\u002Fdiv>\n      <div class=\"q t\"><h4><span class=\"badge\">T<\u002Fspan>威脅 Threats<\u002Fh4><ul><li>LLM <strong class=\"k\">幻覺<\u002Fstrong>或輸出不穩定<\u002Fli><li>CloudWatch <strong class=\"k\">數據延遲<\u002Fstrong>導致判斷落後<\u002Fli><li>權限過大 → <strong class=\"k\">誤操作<\u002Fstrong>生產風險<\u002Fli><\u002Ful><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"slug\">DevOps Day Taipei 2026<span class=\"sep\">/<\u002Fspan>SWOT<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 25 TAKEAWAYS ============ -->\n  <section class=\"slide grid\" data-label=\"重點帶走\" data-screen-label=\"Takeaways\">\n    <span class=\"eyebrow\"><span class=\"dot\"><\u002Fspan>Takeaways<span class=\"seg\">· 帶回去的三件事<\u002Fspan><\u002Fspan>\n    <h2 class=\"h-title fade-up\" style=\"margin-top:14px;\">金絲雀的難點，是判斷，不是切換<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:42px;flex:1;align-content:center;\">\n      <div class=\"card fade-up\" style=\"border-top:3px solid var(--green);\"><div class=\"aws-ico aws-mgmt\" style=\"width:60px;height:60px;border-radius:12px;margin-bottom:18px;\"><svg viewBox=\"0 0 24 24\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><path d=\"M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div class=\"card-title\">遙測即訊號<\u002Fdiv><p class=\"card-body\">Service Connect + Container Insights 直接餵決策，少一層轉換。<\u002Fp><\u002Fdiv>\n      <div class=\"card fade-up d1\" style=\"border-top:3px solid var(--amber);\"><div class=\"aws-ico aws-ml\" style=\"width:60px;height:60px;border-radius:12px;margin-bottom:18px;\"><svg viewBox=\"0 0 24 24\" stroke-width=\"2\"><rect x=\"5\" y=\"5\" width=\"14\" height=\"14\" rx=\"2\"><\u002Frect><rect x=\"9.5\" y=\"9.5\" width=\"5\" height=\"5\"><\u002Frect><path d=\"M9 2v3M15 2v3M9 19v3M15 19v3M2 9h3M2 15h3M19 9h3M19 15h3\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div class=\"card-title\">決策可審計<\u002Fdiv><p class=\"card-body\">LLM 給的不只是動作，還有理由鏈 — 維運才敢把手交出去。<\u002Fp><\u002Fdiv>\n      <div class=\"card fade-up d2\" style=\"border-top:3px solid var(--red);\"><div class=\"aws-ico aws-cont\" style=\"width:60px;height:60px;border-radius:12px;margin-bottom:18px;\"><svg viewBox=\"0 0 24 24\" stroke-width=\"2\"><path d=\"M18 11V6a2 2 0 0 0-4 0M14 10V4a2 2 0 0 0-4 0v2M10 10.5V6a2 2 0 0 0-4 0v8\"><\u002Fpath><path d=\"M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div class=\"card-title\">開發者視角<\u002Fdiv><p class=\"card-body\">用 AWS SDK v2 + Go 把回滾寫成程式，整套迴路看得懂、改得動。<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"lead fade-up d3\" style=\"font-size:30px;color:var(--muted2);\">CloudWatch 是<span class=\"up\">眼睛<\u002Fspan>、Bedrock 是<span class=\"amber\">大腦<\u002Fspan>、ECS UpdateService 是<span class=\"down\">雙手<\u002Fspan> — 合起來就是一個會自己收斂的系統。<\u002Fp>\n    <div class=\"slug\">DevOps Day Taipei 2026<span class=\"sep\">/<\u002Fspan>重點<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 26 CLOSING ============ -->\n  <section class=\"slide grid\" data-label=\"Q&amp;A\" data-screen-label=\"Closing\">\n    <span class=\"eyebrow\"><span class=\"dot\"><\u002Fspan>Thank you<\u002Fspan>\n    <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;\">\n      <h2 class=\"h-big fade-up\" style=\"font-size:80px;\">謝謝聆聽，<span class=\"amber\">一起把判斷交給迴路<\u002Fspan>。<\u002Fh2>\n      <p class=\"h-sub fade-up d1\" style=\"margin-top:30px;max-width:1000px;\">問題、踩雷經驗、想試的訊號 — 歡迎現場交流。<\u002Fp>\n      <div class=\"row fade-up d2\" style=\"gap:24px;align-items:center;margin-top:54px;\">\n        <img src=\"92fa1fb8-66dc-4a75-b670-1ab29f9f1df0\" class=\"avatar\" width=\"92\" height=\"92\" alt=\"Michael Ho\">\n        <div>\n          <div style=\"font-size:32px;font-weight:600;color:var(--ink);\">Michael Ho（何剛）<\u002Fdiv>\n          <div class=\"num\" style=\"font-size:24px;color:var(--muted);margin-top:4px;\">Sr. Full Stack Engineer<\u002Fdiv>\n        <\u002Fdiv>\n        <span class=\"spacer\"><\u002Fspan>\n        <span class=\"chip mono\">Q &amp; A<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"row fade-up d3\" style=\"gap:14px;flex-wrap:wrap;\">\n      <span class=\"chip mono\">Go 1.26<\u002Fspan><span class=\"chip mono\">AWS SDK v2<\u002Fspan><span class=\"chip mono\">ECS Service Connect<\u002Fspan><span class=\"chip mono\">Bedrock<\u002Fspan><span class=\"chip mono\">CloudWatch<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"slug\">DevOps Day Taipei 2026<span class=\"sep\">/<\u002Fspan>Go × ECS × LLM<\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdeck-stage>\n<script src=\"6e3e2e2a-25b1-4740-99c3-70b54cdab039\"><\u002Fscript>\n<script>\n  // Belt-and-suspenders: run the deck's fit directly (not only via rAF) so the\n  // canvas scales immediately on load even in throttled/hidden contexts, and\n  // force-clear the deck's `data-fonts-pending` reveal gate. That gate keeps the\n  // shadow .stage at opacity:0 until a requestAnimationFrame+fonts.ready chain\n  // fires; in throttled/headless capture contexts (PPTX export, screenshot\n  // services) rAF can freeze, so the reveal never runs and the deck paints\n  // black. Clearing the attribute here guarantees the stage is visible.\n  (function(){\n    function reveal(){\n      var d=document.querySelector('deck-stage');\n      if(!d) return;\n      d.removeAttribute('data-fonts-pending');\n      if(d._fit) d._fit();\n    }\n    reveal();\n    window.addEventListener('load', function(){ reveal(); setTimeout(reveal,60); setTimeout(reveal,250); setTimeout(reveal,600); });\n    document.addEventListener('DOMContentLoaded', reveal);\n    if(document.fonts && document.fonts.ready) document.fonts.ready.then(reveal, reveal);\n  })();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
